<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Easy English Coach</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app">
      <header class="app-header">
        <div>
          <p class="eyebrow">Beginner English</p>
          <h1>Easy English Coach</h1>
        </div>
        <button class="icon-button" id="refreshSelection" title="현재 페이지 선택 문장 가져오기" aria-label="현재 페이지 선택 문장 가져오기">
          ↻
        </button>
      </header>

      <nav class="tabs" aria-label="학습 메뉴">
        <button class="tab active" data-tab="learn" type="button">학습</button>
        <button class="tab" data-tab="wordbook" type="button">단어장</button>
        <button class="tab" data-tab="quiz" type="button">퀴즈</button>
      </nav>

      <section class="panel active" id="learnPanel">
        <label class="field-label" for="englishInput">영어 단어 또는 문장</label>
        <textarea id="englishInput" rows="4" placeholder="웹페이지에서 영어 문장을 선택하거나 여기에 직접 입력하세요."></textarea>

        <div class="actions">
          <button class="primary" id="explainButton" type="button">쉽게 설명</button>
          <button class="secondary" id="saveButton" type="button">단어장 저장</button>
        </div>

        <article class="explain-card" id="explanation">
          <p class="empty">영어를 입력하면 초보자용 뜻, 핵심 단어, 예문을 보여드립니다.</p>
        </article>
      </section>

      <section class="panel" id="wordbookPanel">
        <div class="section-heading">
          <h2>내 단어장</h2>
          <button class="text-button" id="clearWords" type="button">전체 삭제</button>
        </div>
        <ul class="word-list" id="wordList"></ul>
      </section>

      <section class="panel" id="quizPanel">
        <div class="quiz-box" id="quizBox">
          <p class="empty">단어장에 2개 이상 저장하면 퀴즈를 시작할 수 있습니다.</p>
        </div>
        <button class="primary full" id="nextQuiz" type="button">다음 문제</button>
      </section>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
